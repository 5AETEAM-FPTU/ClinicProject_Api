name: Build & Deploy Clinic API

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_DIR: /opt/clinic-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # Build Docker image & save as tar
      # ============================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t clinic-api:latest .
          docker save clinic-api:latest | gzip > clinic-api.tar.gz

      # ============================================
      # Setup SSH key
      # ============================================
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ============================================
      # Transfer files to VPS
      # ============================================
      - name: Transfer Docker image & configs to VPS
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          # Create app directory on VPS
          $SSH_CMD "mkdir -p ${{ env.APP_DIR }}"

          # Transfer files
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no \
            clinic-api.tar.gz \
            docker-compose.yml \
            deploy/nginx.conf.template \
            deploy/setup-server.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.APP_DIR }}/

      # ============================================
      # Create appsettings.json from secret
      # ============================================
      - name: Deploy appsettings.json
        env:
          APPSETTINGS_CONTENT: ${{ secrets.APPSETTINGS_JSON }}
        run: |
          printf '%s' "$APPSETTINGS_CONTENT" > /tmp/appsettings.json
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no \
            /tmp/appsettings.json \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.APP_DIR }}/appsettings.json
          rm -f /tmp/appsettings.json

      # ============================================
      # Setup Nginx + SSL + Deploy
      # ============================================
      - name: Setup Nginx, SSL & Deploy application
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'DEPLOY_SCRIPT'

          set -euo pipefail
          APP_DIR="/opt/clinic-api"
          DOMAIN="${{ secrets.DOMAIN }}"
          SSL_EMAIL="${{ secrets.SSL_EMAIL }}"

          cd "$APP_DIR"

          echo "==> [1/6] Installing dependencies..."
          # Install Docker if not present
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com | sh
            systemctl enable docker && systemctl start docker
          fi

          # Install Docker Compose plugin if not present
          if ! docker compose version &> /dev/null; then
            apt-get update && apt-get install -y docker-compose-plugin
          fi

          # Install Nginx if not present
          if ! command -v nginx &> /dev/null; then
            apt-get update && apt-get install -y nginx
            systemctl enable nginx
          fi

          # Install Certbot if not present
          if ! command -v certbot &> /dev/null; then
            apt-get update && apt-get install -y certbot python3-certbot-nginx
          fi

          echo "==> [2/6] Loading Docker image..."
          docker load < clinic-api.tar.gz
          rm -f clinic-api.tar.gz

          echo "==> [3/6] Configuring Nginx for $DOMAIN..."
          # Generate nginx config from template
          sed "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" nginx.conf.template > /etc/nginx/sites-available/clinic-api
          ln -sf /etc/nginx/sites-available/clinic-api /etc/nginx/sites-enabled/clinic-api

          echo "==> [4/6] Setting up SSL certificate..."
          # Check if SSL cert already exists
          if [ ! -f "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" ]; then
            # First time: use HTTP-only config to get cert
            cat > /etc/nginx/sites-available/clinic-api <<TEMP_NGINX
          server {
              listen 80;
              server_name $DOMAIN;
              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }
              location / {
                  return 200 'Setting up...';
                  add_header Content-Type text/plain;
              }
          }
          TEMP_NGINX
            mkdir -p /var/www/certbot
            nginx -t && systemctl reload nginx

            # Obtain SSL certificate
            certbot certonly --webroot \
              -w /var/www/certbot \
              -d "$DOMAIN" \
              --non-interactive \
              --agree-tos \
              -m "${SSL_EMAIL:-admin@$DOMAIN}"

            # Now apply full config with SSL
            sed "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" "$APP_DIR/nginx.conf.template" > /etc/nginx/sites-available/clinic-api
          else
            echo "    SSL certificate already exists, renewing only $DOMAIN..."
            certbot renew --cert-name "$DOMAIN" --quiet || echo "    Renewal skipped (cert still valid)"
          fi

          nginx -t && systemctl reload nginx

          echo "==> [5/6] Setting up SSL auto-renewal cron..."
          # Only add auto-renewal for clinic domain, do not touch other certs
          if ! crontab -l 2>/dev/null | grep -q "cert-name $DOMAIN"; then
            (crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --cert-name $DOMAIN --quiet --post-hook 'systemctl reload nginx'") | crontab -
          fi

          echo "==> [6/6] Starting application with Docker Compose..."
          cd "$APP_DIR"
          docker compose down --remove-orphans || true
          docker compose up -d

          # Wait for health check
          echo "    Waiting for API to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5000 > /dev/null 2>&1; then
              echo "    API is running!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "    WARNING: API did not respond within 30s, check logs with: docker logs clinic-api"
            fi
            sleep 2
          done

          echo "==> Deployment complete!"
          echo "    URL: https://$DOMAIN"
          echo "    API Swagger: https://$DOMAIN/"

          DEPLOY_SCRIPT

      # ============================================
      # Cleanup
      # ============================================
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
