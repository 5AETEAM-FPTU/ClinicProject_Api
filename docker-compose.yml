services:
  clinic-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: clinic-api:latest
    container_name: clinic-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./appsettings.json:/app/appsettings.json:ro
      - clinic-dataprotection-keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clinic-network

  mysql:
    image: mysql:8.0
    container_name: clinic-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ClinicDb@2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ClinicDb}
    ports:
      - "3307:3306"
    volumes:
      - clinic-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinic-network

  redis:
    image: redis:7-alpine
    container_name: clinic-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - clinic-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinic-network

volumes:
  clinic-mysql-data:
  clinic-redis-data:
  clinic-dataprotection-keys:

networks:
  clinic-network:
    driver: bridge
